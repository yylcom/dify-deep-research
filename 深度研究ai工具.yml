    - data:
        code: "import json, re\ndef main(text: str, fallback: str) -> dict:\n    try:\n\
          \        m = re.search(r\"\\{.*\\}\", text or \"{}\", re.S)\n        data\
          \ = json.loads(m.group(0) if m else \"{}\")\n    except Exception:\n   \
          \     data = {}\n    return {\n        \"report_final\": data.get(\"report_final\"\
          ) or fallback,\n        \"is_good\": bool(data.get(\"is_good\", False)),\n\
          \        \"quality_feedback\": data.get(\"quality_feedback\", \"\")\n  \
          \  }\n"
        code_language: python3
        desc: 整理最终输出。
        outputs:
          is_good:
            children: null
            type: boolean
          quality_feedback:
            children: null
            type: string
          report_final:
            children: null
            type: string
