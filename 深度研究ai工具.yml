          : question,\n            \"content\": content,\n            \"sources\"\
          : info,\n            \"score\": score,\n            \"reason\": q.get(\"\
          reason\", \"\"),\n            \"quality_feedback\": q.get(\"quality_feedback\"\
          , \"\"),\n            \"confidence\": confidence,\n            \"evidence_gap\"\
          : evidence_gap\n        }\n    }\n"
