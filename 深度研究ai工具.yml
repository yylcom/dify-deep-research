          \ or \"{}\", re.S)\n        q = json.loads(m.group(0) if m else \"{}\")\n\
          \    except Exception:\n        q = {}\n    score = float(q.get(\"score\"\
          , 0) or 0)\n    info = extracted_info or []\n    if score < 0.6:\n     \
          \   content = \"当前资料不足，需要补充搜索；已保留现有来源并标记低置信度。\"\n        confidence = \"\
